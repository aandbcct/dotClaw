# ============================================
# dotClaw 配置文件（Phase 6 升级）
# ============================================

llm:
  default_model: qwen3.7-max
  clients:
    qwen3.7-max:
      provider: qwen
      api_key: ${QWEN_API_KEY}
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen3.7-max
    qwen-turbo:
      provider: qwen
      api_key: ${QWEN_API_KEY}
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-turbo
  fallbacks:
    - qwen-turbo
  retry:
    max_retries: 3
    base_delay: 1.0
  stream: true

agent:
  system_prompt: |
    你是一个有用、诚实、友好、说话干脆的 AI 助手。
    你可以调用工具来帮助用户完成任务。
    当需要执行危险操作时会请求确认。
    专注于当前会话，历史会话信息仅用作本次会话的参考，严禁在本次会话中提到与本次会话无关的内容
  max_context_tokens: 8000
  keep_recent_messages: 10
  truncated_continue: true   # v2: finish_reason="length" 时自动注入 "continue" 继续生成

tools:
  # source 级启停（Phase 5 新增）
  builtin_enabled: true
  mcp_enabled: true
  skill_enabled: true

  # 危险工具审批命令列表（Tool v1 阶段二：使用新规范名）
  approval_commands:
    - builtin.process.execute

  # 单工具禁用列表（新格式；旧嵌套格式 tools.exec.* 已不再读取）
  disabled_tools: []

  exec_timeout: 60

  # Tool v1 阶段一：固定网络服务配置（总体设计 §7.1）。
  # 默认两项均关闭，不产生可用的网络能力；启用即代表用户对该服务的显式预授权。
  # 端点、方法与认证方式由代码固定，不在此处配置（开发计划 §2.3）。
  network:
    tavily:
      enabled: true
    open_meteo:
      enabled: true

  # 工具安全策略（Tool v1 阶段三，总体设计 §7.1）
  # 全局规则是安全上限；Agent 级策略只能收窄，不得放宽。
  # 注意：network.http 不再在此显式声明；其取值由启用服务自动派生
  # （启用任一服务 → allow，否则 deny），以免覆盖受限授权（开发计划 §2.3）。
  policy:
    workspace_root: .
    rules:
      workspace.read: allow      # 工作区读
      workspace.write: ask       # 工作区写（需审批）
      process.exec: ask          # 进程执行（需审批）
      mcp.connect: ask           # MCP 连接（需审批）
      mcp.call: ask              # MCP 调用（需审批）
    denied_paths:                # 命中即拒绝（glob，详见 default_policy_scope）
      - ".env"
      - ".git/**"
      - "**/*.key"
    allowed_mcp_servers: ["github"]  # 允许连接的 MCP server 名；空列表在加载时被忽略，沿用默认允许列表

  # Phase 6 新增：MCP 全局配置
  mcp_global:
    startup_timeout: 4.0
    tool_timeout: 60.0
    restart_on_crash: true
    max_restart_attempts: 3

  # Phase 6 新增：MCP servers 列表
  mcp_servers: []
  # 示例:
  #   - name: filesystem
  #     transport: stdio
  #     command: npx
  #     args: ["-y", "@anthropic/mcp-server-filesystem", "/tmp"]
  #   - name: remote-api
  #     transport: streamable_http
  #     url: http://localhost:8080/mcp
  #     headers:
  #       Authorization: "Bearer ${MCP_API_KEY}"
  #     tool_timeout: 120.0

skills:
  directory: ./skills

memory:
  long_term_file: ./data/memory/MEMORY.md

session:
  directory: ./data/sessions

scheduler:
  enabled: true

debug:
  level: INFO
  log_file: ./data/dotclaw.log

journal:
  trace_dir: ./data/sessions
  snapshot_dir: ./data/snapshots
  console: true
  trace: true
  snapshot: true
