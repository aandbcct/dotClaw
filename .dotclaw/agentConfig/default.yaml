# ============================================
# dotClaw Agent 配置 (default.yaml)
# ============================================

# ── 身份标识 ──
agent_id: default
agent_name: "日常助手"
description: "默认日常助手"

# ── 模型 ──
model: ""                  # 空字符串 = 使用 config.llm.default_model

# ── 工作空间 ──
workspace: "."             # . = 跟随 project_root

# ── 模型参数覆盖 ──
model_params:
  temperature: 0.7
  max_tokens: 8192
  top_p: 0.95

# ── 工具白名单 ──
allowed_tools: []          # 空列表 = 所有已注册工具均可用

# ── Skill 白名单 ──
registered_skills: []      # 空 = 跟随 config.skills.enabled 使用全局 skill 列表

# ── 循环控制 ──
max_loop_steps: 15         # ReAct 最大迭代数

# ── System Prompt ──
agent_prompt: |
    你是一个有用、诚实、友好、说话干脆的 AI 助手。
    你可以调用工具来帮助用户完成任务。
    当需要执行危险操作时会请求确认。
    专注于当前会话，历史会话信息仅用作本次会话的参考，严禁在本次会话中提到与本次会话无关的内容"
# 示例模板（取消注释生效）：
# system_prompt_template: |
#   你是 {agent_name}，一个专业的编程助手。
#   你的工作目录是 {workspace}。
#
#   核心能力：
#   - 阅读和理解代码库
#   - 编写高质量、可维护的代码
#   - 重构和优化现有代码
#   - 调试和修复 bug
#   - 解释技术概念
#
#   行为准则：
#   - 先理解再行动
#   - 代码变更前先阅读相关文件
#   - 遵循项目现有代码风格
#   - 对危险操作请求确认

# ── 标签 ──
tags:
  - programming
  - code-review
  - refactoring
